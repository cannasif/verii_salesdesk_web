<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/v3rii-salesdesk-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> V3RII SalesDesk SYSTEM</title>
    <script>
      (function() {
        const theme = localStorage.getItem('vite-ui-theme') || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
        const brandTheme = localStorage.getItem('vite-ui-brand-theme') || 'v3rii';
        const brandThemeClassMap = {
          v3rii: 'theme-v3rii',
          corporateBlue: 'theme-corporate-blue',
          graphite: 'theme-graphite',
          emerald: 'theme-emerald',
          executive: 'theme-executive',
          burgundy: 'theme-burgundy',
          industrialSteel: 'theme-industrial-steel',
          cleanLight: 'theme-clean-light',
          highContrast: 'theme-high-contrast',
          minimalCrm: 'theme-minimal-crm',
          flatNavy: 'theme-flat-navy',
          flatSlate: 'theme-flat-slate',
          flatWhite: 'theme-flat-white',
        };
        document.documentElement.classList.add(brandThemeClassMap[brandTheme] || 'theme-v3rii');
        document.documentElement.dataset.brandTheme = brandThemeClassMap[brandTheme] ? brandTheme : 'v3rii';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
